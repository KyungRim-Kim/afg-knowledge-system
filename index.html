<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AFG 지식관리 시스템</title>

<style>
:root{
  --navy-deep:#0A1628;--navy:#0D1F3C;--navy-mid:#112347;--navy-light:#172D58;
  --border:rgba(255,255,255,.14);--border-2:rgba(255,255,255,.22);
  --white:#fff;--w2:#D8E4F5;--w3:#A8BDD8;--w4:#6E8AAD;--w5:rgba(255,255,255,.10);
  --accent:#4A7FD4;--accent2:#2E5FA8;--gold:#C9A96E;--red:#C06060;
  --cat-faq:#C9A96E;--cat-pro:#6BA888;--cat-scr:#6896C8;--cat-man:#A87878;
  --cat-act:#68A8A8;--cat-not:#A89068;--cat-cla:#8878A8;--cat-etc:#687888;
  --hh:54px;--tbh:62px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy);color:var(--white);font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--navy)}::-webkit-scrollbar-thumb{background:var(--navy-light)}
input,select,textarea,button{font-family:'Noto Sans KR',sans-serif;outline:none;-webkit-appearance:none;box-sizing:border-box}
textarea{resize:vertical}

/* ─ 공통 ─ */
.inp{width:100%;background:var(--navy-deep);border:1px solid var(--border-2);border-radius:8px;padding:11px 14px;color:var(--white);font-size:14px;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--w4)}
select.inp option{background:var(--navy-mid)}
.lbl{display:block;color:var(--w3);font-size:11px;margin-bottom:6px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.btn-p{background:var(--accent);color:#fff;border:none;padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;border-radius:8px;min-height:44px;white-space:nowrap;transition:background .15s}
.btn-p:hover{background:var(--accent2)}
.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-l{background:transparent;color:var(--w2);border:1px solid var(--border-2);padding:11px 18px;font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;min-height:44px;transition:all .15s}
.btn-l:hover{border-color:var(--accent);color:var(--white)}
.btn-s{background:rgba(255,255,255,.12);border:none;color:var(--w2);padding:6px 12px;font-size:12px;cursor:pointer;border-radius:6px;min-height:36px;transition:all .15s}
.btn-s:hover{color:var(--white);background:rgba(255,255,255,.2)}
.pill{font-size:10px;font-weight:700;padding:3px 8px;letter-spacing:.05em;text-transform:uppercase;border-radius:4px}
.tag{background:rgba(255,255,255,.12);color:var(--w2);font-size:11px;padding:3px 8px;border:1px solid var(--border-2);border-radius:4px}
.card{background:var(--navy-mid);border:1px solid var(--border);padding:16px;cursor:pointer;transition:all .15s;border-radius:10px}
.card:hover,.card:active{background:var(--navy-light);border-color:var(--border-2)}

/* ─ overlay/modal ─ */
.overlay{position:fixed;inset:0;background:rgba(5,12,25,.92);display:flex;align-items:flex-end;justify-content:center;z-index:300;padding:0}
.modal{background:var(--navy-mid);border:1px solid var(--border-2);padding:24px 20px;width:100%;max-height:92vh;overflow-y:auto;border-radius:16px 16px 0 0}
@media(min-width:600px){.overlay{align-items:center;padding:20px}.modal{border-radius:12px;max-width:660px;padding:32px}}
.toast{position:fixed;top:calc(var(--hh) + 10px);left:50%;transform:translateX(-50%);z-index:400;padding:10px 20px;font-size:13px;font-weight:600;border-radius:20px;white-space:nowrap;animation:tIn .25s ease;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ─ 헤더 ─ */
#hdr{background:var(--navy-deep);border-bottom:1px solid var(--border);position:fixed;top:0;left:0;right:0;z-index:100;height:var(--hh)}
.hdr-in{max-width:1200px;margin:0 auto;padding:0 16px;display:flex;align-items:center;height:100%;gap:8px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-right:8px}
.logo svg{width:26px;height:26px}
.logo-t{font-size:16px;font-weight:700;letter-spacing:.16em}
.logo-s{font-size:9px;color:var(--w4);letter-spacing:.1em;text-transform:uppercase;margin-left:4px}
.pc-nav{display:flex;flex:1;overflow-x:auto}
.pnb{background:transparent;color:var(--w3);border:none;padding:0 14px;height:var(--hh);font-size:11px;font-weight:700;letter-spacing:.08em;cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;white-space:nowrap;transition:color .15s}
.pnb:hover{color:var(--w2)}
.pnb.on{color:var(--white);border-bottom-color:var(--accent)}
.usr{flex-shrink:0;text-align:right}
.usr-n{font-size:13px;font-weight:600}
.usr-s{font-size:10px;color:var(--w4)}

/* ─ 하단 탭바 (모바일) ─ */
#tbar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--navy-deep);border-top:1px solid var(--border);height:var(--tbh);padding-bottom:env(safe-area-inset-bottom,0px)}
.tb{flex:1;background:transparent;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--w3);cursor:pointer;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:8px 2px;transition:color .15s}
.tb.on{color:var(--accent)}
.tb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ─ 본문 ─ */
#main{max-width:1200px;margin:0 auto;padding:calc(var(--hh) + 20px) 20px 20px}

@media(max-width:599px){
  .pc-nav,.logo-s,.usr,.pc-logout{display:none!important}
  #tbar{display:flex}
  #main{padding:calc(var(--hh) + 14px) 12px calc(var(--tbh) + 14px)}
  .modal{padding:20px 16px}
}
@media(min-width:600px) and (max-width:900px){
  .logo-s{display:none}
  #main{padding:calc(var(--hh) + 16px) 16px 16px}
}

/* ─ 통계 ─ */
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
@media(max-width:599px){.sg{grid-template-columns:repeat(3,1fr)}}
@media(max-width:360px){.sg{grid-template-columns:repeat(2,1fr)}}
.sc{background:var(--navy-mid);border:1px solid var(--border);padding:14px 12px;border-radius:10px}
.sn{font-size:22px;font-weight:300;line-height:1}
.sl{font-size:10px;color:var(--w3);letter-spacing:.05em;text-transform:uppercase;margin-top:4px}

/* ─ 카테고리 필터 스크롤 ─ */
.cscroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:16px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cscroll::-webkit-scrollbar{display:none}
.cbtn{flex-shrink:0;padding:7px 14px;font-size:11px;font-weight:700;letter-spacing:.05em;cursor:pointer;border-radius:20px;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--w3);transition:all .15s;min-height:34px}

/* ─ 문서 그리드 ─ */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
@media(max-width:599px){.dg{grid-template-columns:1fr}}

/* ─ AI ─ */
.ai-wrap{display:grid;grid-template-columns:190px 1fr;gap:10px;height:calc(100vh - var(--hh) - 40px)}
@media(max-width:900px){.ai-wrap{grid-template-columns:160px 1fr}}
@media(max-width:599px){
  .ai-wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr;height:calc(100vh - var(--hh) - var(--tbh) - 28px)}
  .ai-side{padding:12px;max-height:220px}
}
.ai-side{background:var(--navy-mid);border:1px solid var(--border);padding:16px;overflow-y:auto;border-radius:10px}
.ai-chat{background:var(--navy-mid);border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;border-radius:10px}
#cmsg{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.cu{background:var(--accent);color:#fff;padding:11px 14px;font-size:13px;line-height:1.7;max-width:80%;white-space:pre-wrap;font-weight:500;border-radius:16px 16px 4px 16px;align-self:flex-end}
.ca{background:var(--navy-deep);color:var(--w2);border:1px solid var(--border);padding:14px 16px;font-size:13px;line-height:1.75;max-width:88%;word-break:break-word;border-radius:16px 16px 16px 4px}

/* ─ 허브 ─ */
.hg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
@media(max-width:599px){.hg{grid-template-columns:1fr}}
.hcard{background:var(--navy-mid);border:1px solid var(--border-2);padding:16px;border-radius:10px;text-decoration:none;display:block;transition:background .15s;color:#FFFFFF}
.hcard:hover,.hcard:active{background:var(--navy-light)}

/* ─ 탭/섹션 ─ */
.stabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{background:transparent;color:var(--w3);border:none;padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.stab.on{color:var(--white);border-bottom-color:var(--accent)}

/* ─ 테이블 ─ */
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:480px}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--w3);font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border-2);background:var(--navy-deep);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--w2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--w5)}

.ldots span{animation:blink 1.2s infinite;opacity:0}
.ldots span:nth-child(2){animation-delay:.2s}
.ldots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:0}50%{opacity:1}}
</style>
</head>

/* ─ 지식 베이스 ─ */
function renderKnow(){
  const filtered=S.docs.filter(d=>{
    const co=S.selCat==='전체'||d.category===S.selCat;
    const q=S.search.toLowerCase();
    return co&&(!q||d.title.toLowerCase().includes(q)||d.content.toLowerCase().includes(q)||(d.tags||[]).some(t=>t.includes(q)));
  });
  const stats=[
    {l:"전체",v:S.docs.length,c:"var(--accent)"},
    {l:"FAQ",v:S.docs.filter(d=>d.category==='FAQ').length,c:CHEX['FAQ']},
    {l:"상품요약",v:S.docs.filter(d=>d.category==='상품요약').length,c:CHEX['상품요약']},
    {l:"스크립트",v:S.docs.filter(d=>d.category==='상담스크립트').length,c:CHEX['상담스크립트']},
    {l:"보상사례",v:S.docs.filter(d=>d.category==='보상사례').length,c:CHEX['보상사례']},
  ];
  return`
  <div class="sg">
    ${stats.map(s=>`<div class="sc"><div class="sn" style="color:${s.c}">${s.v}</div><div class="sl">${s.l}</div></div>`).join('')}
  </div>
  <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center">
    <input id="srch" class="inp" style="flex:1" placeholder="제목, 내용, 태그 검색" value="${esc(S.search)}">
    <button id="new-doc" class="btn-p" style="flex-shrink:0">+ 새 문서</button>
  </div>
  <div class="cscroll">
    ${['전체',...CATS].map(c=>{
      const on=S.selCat===c;
      const col=c==='전체'?'var(--accent)':CHEX[c];
      return`<button class="cbtn ccat" data-cat="${c}" style="${on?`background:${col};color:#fff;border-color:${col}`:'background:transparent;color:var(--w3);border-color:var(--border)'}">${c}</button>`;
    }).join('')}
  </div>
  <div class="dg">
    ${filtered.map(doc=>{
      const ce=S.user.role==='admin'||doc.author===S.user.id;
      const cc=CHEX[doc.category]||'#888';
      return`<div class="card" data-did="${doc.id}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span class="pill" style="background:${cc}22;color:${cc};border:1px solid ${cc}40">${doc.category}</span>
          ${ce?`<div style="display:flex;gap:4px" onclick="event.stopPropagation()">
            <button class="btn-s edb" data-id="${doc.id}" style="font-size:11px;padding:5px 10px">수정</button>
            <button class="btn-s dlb" data-id="${doc.id}" style="font-size:11px;padding:5px 10px;color:var(--w4)">삭제</button>
          </div>`:''}
        </div>
        <div style="font-size:14px;font-weight:600;margin-bottom:7px;line-height:1.4">${esc(doc.title)}</div>
        <div style="font-size:12px;color:var(--w3);line-height:1.7;margin-bottom:10px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(doc.content)}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${(doc.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
        <div style="font-size:11px;color:var(--w4)">${esc(doc.authorName)} · ${doc.updatedAt}</div>
      </div>`;}).join('')}
  </div>
  ${filtered.length===0?`<div style="text-align:center;padding:60px 20px;color:var(--w4);font-size:13px">검색 결과가 없습니다</div>`:''}
  `}

function renderStats(){
  const cs=CATS.map(c=>({c,n:S.docs.filter(d=>d.category===c).length})).filter(s=>s.n>0);
  const us=S.users.map(u=>({n:u.name,t:u.team,cnt:S.docs.filter(d=>d.author===u.id).length})).sort((a,b)=>b.cnt-a.cnt);
  const mx=Math.max(...cs.map(s=>s.n),1);
  return`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div style="background:var(--navy-mid);border:1px solid var(--border);padding:20px;border-radius:10px">

        </div>
        <div style="background:var(--border);height:2px;border-radius:1px"><div style="background:${CHEX[s.c]};height:2px;width:${(s.n/mx)*100}%"></div></div>

      <div style="font-size:11px;font-weight:700;color:var(--w4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px">플래너별 기여</div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin-top:16px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
        ${[["전체",S.docs.length],["플래너",S.users.filter(u=>u.role==='employee').length],["카테고리",CATS.filter(c=>S.docs.some(d=>d.category===c)).length]]

/* ─ 이벤트 바인딩 ─ */
function bind(){
  if(!S.user){
    const go=()=>{
      const id=document.getElementById('li')?.value,pw=document.getElementById('lp')?.value;
      const u=S.users.find(u=>u.id===id&&u.pw===pw);
      if(u){set({user:u,msgs:[{role:'assistant',content:`안녕하세요, ${u.name}님.\n\nAFG 지식관리 시스템입니다.\n내부 지식 베이스와 외부 공시 데이터로 상담 업무를 지원합니다.\n\n예시 질문\n· 보험금 청구 서류 안내\n· 암보험 보장 내용 요약\n· 보험료 거절 고객 응대 방법\n· 갑상선암 소액암 판례 (웹 검색 ON 권장)`}]});}
      else{const el=document.getElementById('le');if(el)el.textContent='아이디 또는 비밀번호가 올바르지 않습니다.';}
    };
    document.getElementById('lb')?.addEventListener('click',go);
    ['lp','li'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter'){id==='li'?document.getElementById('lp').focus():go();}}));
    return;
  }

  const logout=()=>set({user:null,msgs:[]});
  document.getElementById('pc-logout')?.addEventListener('click',logout);
  document.getElementById('mob-logout')?.addEventListener('click',logout);
  document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>set({view:b.dataset.view})));

  /* 지식 베이스 */
  if(S.view==='knowledge'){
    document.getElementById('srch')?.addEventListener('input',e=>set({search:e.target.value}));
    document.getElementById('new-doc')?.addEventListener('click',()=>set({showDocForm:true,editDoc:null}));
    document.querySelectorAll('.ccat').forEach(b=>b.addEventListener('click',()=>set({selCat:b.dataset.cat})));
    document.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('click',e=>{
        if(e.target.closest('.edb,.dlb'))return;
        const d=S.docs.find(d=>d.id===card.dataset.did);if(d)set({selDoc:d});
      });
    });
    document.querySelectorAll('.edb').forEach(b=>b.addEventListener('click',()=>set({editDoc:S.docs.find(d=>d.id===b.dataset.id),showDocForm:true})));
    document.querySelectorAll('.dlb').forEach(b=>b.addEventListener('click',()=>{
      if(!confirm('삭제하시겠습니까?'))return;
      const nd=S.docs.filter(d=>d.id!==b.dataset.id);sv('afg_d',nd);set({docs:nd});toast('문서가 삭제되었습니다.');
    }));
  }

  /* 문서 모달 */
  document.getElementById('dmbg')?.addEventListener('click',()=>set({selDoc:null}));
  document.getElementById('cdm')?.addEventListener('click',()=>set({selDoc:null}));
  document.getElementById('mde')?.addEventListener('click',()=>set({editDoc:S.selDoc,showDocForm:true,selDoc:null}));
  document.getElementById('mdd')?.addEventListener('click',()=>{
    if(!confirm('삭제하시겠습니까?'))return;
    const nd=S.docs.filter(d=>d.id!==S.selDoc.id);sv('afg_d',nd);set({docs:nd,selDoc:null});toast('문서가 삭제되었습니다.');
  });

  /* 문서 폼 */
  ['dfbg','cdf','cfdf'].forEach(id=>document.getElementById(id)?.addEventListener('click',()=>set({showDocForm:false,editDoc:null})));
  document.getElementById('sfdf')?.addEventListener('click',()=>{
    const title=document.getElementById('ftit').value.trim();
    const content=document.getElementById('fcon').value.trim();
    const category=document.getElementById('fcat').value;
    const tags=document.getElementById('ftag').value.split(',').map(t=>t.trim()).filter(Boolean);
    if(!title||!content){alert('제목과 내용을 입력해주세요.');return;}
    let nd;
    if(S.editDoc){nd=S.docs.map(d=>d.id===S.editDoc.id?{...d,title,content,category,tags,updatedAt:td()}:d);toast('문서가 수정되었습니다.');}
    else{nd=[{id:'d'+Date.now(),title,content,category,tags,author:S.user.id,authorName:S.user.name,createdAt:td(),updatedAt:td()},...S.docs];toast('문서가 등록되었습니다.');}
    sv('afg_d',nd);set({docs:nd,showDocForm:false,editDoc:null});
  });

  /* AI */
  if(S.view==='ai'){
    /* 외부검색 토글 */
    document.getElementById('aweb')?.addEventListener('change',e=>set({aiWeb:e.target.checked}));

    /* 초기화 */
    document.getElementById('creset')?.addEventListener('click',()=>set({
      msgs:[{role:'assistant',content:'대화가 초기화되었습니다.'}],
      chatInput:'', smartKw:''
    }));

    /* 스마트 키워드 입력 — 입력 중에는 렌더 안 함, 포커스 벗어날 때만 내부문서 업데이트 */
    const skw = document.getElementById('smart-kw');
    if(skw){
      skw.addEventListener('input', e => {
        S.smartKw = e.target.value; // 상태만 저장, 렌더 안 함
      });
      skw.addEventListener('blur', e => {
        // 포커스 벗어날 때 내부문서 결과 업데이트
        if(S.smartKw !== e.target.value){
          S.smartKw = e.target.value;
        }
        render();
        // 렌더 후 포커스 복원 불필요 (blur이므로)
      });
      skw.addEventListener('keydown', e => {
        if(e.key==='Enter'){
          e.preventDefault();
          S.smartKw = skw.value;
          render();
          // 렌더 후 포커스 복원
          setTimeout(()=>document.getElementById('smart-kw')?.focus(), 10);
        }
      });
    }

    /* 키워드 초기화 버튼 */
    document.getElementById('smart-clear')?.addEventListener('click', () => {
      S.smartKw = '';
      S.chatInput = '';
      render();
    });

    /* 내부 문서 바로보기 버튼 */
    document.querySelectorAll('.inner-doc-btn').forEach(b => {
      b.addEventListener('click', () => {
        const d = S.docs.find(d => d.id === b.dataset.id);
        if(d) set({selDoc: d});
      });
    });

    /* 검색 목적(intent) 버튼 클릭 → 자동으로 최적화된 쿼리 생성 후 전송 */
    document.querySelectorAll('.intent-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const kw = (document.getElementById('smart-kw')?.value || S.smartKw || '').trim();
        if(!kw){ alert('먼저 검색 키워드를 입력해주세요.'); document.getElementById('smart-kw')?.focus(); return; }
        const intent = SEARCH_INTENTS.find(i => i.id === btn.dataset.intent);
        if(!intent) return;
        if(intent.id !== 'internal') S.aiWeb = true;
        S.searchIntent = intent;
        /* 채팅창에는 간단하게 표시, 실제 AI에는 상세 프롬프트 전송 */
        S.chatDisplayText = `${kw} — ${intent.label}`;
        S.chatInput = intent.prompt(kw);
        sendChat();
      });
    });

    /* 직접 입력 전송 */
    const ci = document.getElementById('cinp');
    ci?.addEventListener('input', e => { S.chatInput = e.target.value; });
    ci?.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendChat(); } });
    document.getElementById('csend')?.addEventListener('click', sendChat);

    scrollChat();
  }

  /* 허브 */
  if(S.view==='hub') document.querySelectorAll('.htab').forEach(b=>b.addEventListener('click',()=>set({hubTab:b.dataset.tab})));

  /* 관리자 */
  if(S.view==='admin'){
    document.querySelectorAll('.atab').forEach(b=>b.addEventListener('click',()=>set({adminTab:b.dataset.tab})));
    document.getElementById('addu')?.addEventListener('click',()=>set({showUserForm:true,editUser:null}));
    document.querySelectorAll('.eu').forEach(b=>b.addEventListener('click',()=>set({editUser:S.users.find(u=>u.id===b.dataset.id),showUserForm:true})));
    document.querySelectorAll('.du').forEach(b=>b.addEventListener('click',()=>{
      if(!confirm(`${b.dataset.name} 직원을 삭제하시겠습니까?`))return;
      const nu=S.users.filter(u=>u.id!==b.dataset.id);sv('afg_u',nu);set({users:nu});toast(`${b.dataset.name} 직원이 삭제되었습니다.`);
    }));
    document.querySelectorAll('.adl').forEach(b=>b.addEventListener('click',()=>{
      if(!confirm('삭제하시겠습니까?'))return;
      const nd=S.docs.filter(d=>d.id!==b.dataset.id);sv('afg_d',nd);set({docs:nd});toast('문서가 삭제되었습니다.');
    }));
  }

  /* 유저 폼 */
  ['ufbg','cuf','cufb'].forEach(id=>document.getElementById(id)?.addEventListener('click',()=>set({showUserForm:false,editUser:null})));
  document.getElementById('sufb')?.addEventListener('click',()=>{
    const name=document.getElementById('un').value.trim();
    const id=S.editUser?S.editUser.id:document.getElementById('ui').value.trim();
    const pw=document.getElementById('up').value.trim();
    const team=document.getElementById('ut').value.trim();
    const role=document.getElementById('ur').value;
    if(!name||!id||!pw||!team){alert('모든 항목을 입력해주세요.');return;}
    let nu;
    if(S.editUser){nu=S.users.map(u=>u.id===S.editUser.id?{...u,name,pw,team,role}:u);toast('직원 정보가 수정되었습니다.');}
    else{
      if(S.users.find(u=>u.id===id)){toast('이미 존재하는 아이디입니다.','err');return;}
      nu=[...S.users,{id,name,pw,team,role,createdAt:td()}];
      toast(`${name} 직원이 추가되었습니다.`);
    }
    sv('afg_u',nu);set({users:nu,showUserForm:false,editUser:null});
  });
}

/* ─ AI 답변 마크다운 → 읽기 쉬운 HTML 변환 ─ */
function formatAI(text){
  if(!text) return '';
  let t = text
    // 테이블 제거 (|---|---| 패턴)
    .replace(/\|[-:\s|]+\|\n?/g, '')
    // ### 제목 → 굵고 큰 텍스트
    .replace(/^###\s+(.+)$/gm, '<div style="font-size:14px;font-weight:700;color:#fff;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.15)">$1</div>')
    .replace(/^##\s+(.+)$/gm,  '<div style="font-size:15px;font-weight:700;color:#fff;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.2)">$1</div>')
    .replace(/^#\s+(.+)$/gm,   '<div style="font-size:16px;font-weight:700;color:#fff;margin:14px 0 8px">$1</div>')
    // **굵게** → 강조 색상
    .replace(/\*\*(.+?)\*\*/g, '<span style="font-weight:700;color:#D8E4F5">$1</span>')
    // *기울임* 제거 (그냥 텍스트로)
    .replace(/\*(.+?)\*/g, '$1')
    // | 테이블 행 → 깔끔한 목록으로
    .replace(/^\|(.+)\|$/gm, (_, row) => {
      const cells = row.split('|').map(c=>c.trim()).filter(Boolean);
      if(cells.length < 2) return '';
      return '<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.07)">'
        + cells.map((c,i)=>`<span style="flex:1;font-size:12px;color:${i===0?'#A8BDD8':'#D8E4F5'}">${c}</span>`).join('')
        + '</div>';
    })
    // - 목록 → 깔끔한 점 목록
    .replace(/^[-•]\s+(.+)$/gm, '<div style="display:flex;gap:8px;padding:3px 0"><span style="color:#4A7FD4;flex-shrink:0;margin-top:2px">▸</span><span>$1</span></div>')
    // 숫자 목록 → 번호 표시
    .replace(/^(\d+)\.\s+(.+)$/gm, '<div style="display:flex;gap:8px;padding:3px 0"><span style="color:#4A7FD4;flex-shrink:0;font-weight:700;min-width:16px">$1.</span><span>$2</span></div>')
    // 빈 줄 → 간격
    .replace(/\n{2,}/g, '<div style="height:8px"></div>')
    .replace(/\n/g, '<br>')
    // 남은 --- 구분선
    .replace(/^-{3,}$/gm, '<hr style="border:none;border-top:1px solid rgba(255,255,255,.1);margin:8px 0">')
    // 특수문자 이스케이프 방지 (이미 HTML이므로)
    ;
  return `<div style="line-height:1.75;font-size:13px">${t}</div>`;
}

/* ─ AI 채팅 ─ */
async function sendChat(){
  if(S.chatLoading) return;
  const el = document.getElementById('cinp');
  const text = (el?.value || S.chatInput).trim();
  if(!text) return;

  /* 채팅 말풍선에 보일 텍스트 vs AI에 실제로 전달할 텍스트 분리 */
  const displayText = S.chatDisplayText || text;
  const promptText  = text;
  S.chatDisplayText = null;

  const rd  = S.aiCats.length>0 ? S.docs.filter(d=>S.aiCats.includes(d.category)) : S.docs;
  const ctx = rd.slice(0,15).map(d=>`[${d.category}] ${d.title}\n${d.content}\n태그: ${(d.tags||[]).join(', ')}`).join('\n\n---\n\n');

  const intent      = S.searchIntent;
  const intentGuide = intent
    ? `\n【현재 검색 목적】: ${intent.label}\n【우선 참조 소스】: ${intent.sources}\n이 목적에 맞게 위 소스를 우선 검색하고 답변 형식을 최적화하세요.`
    : '';

  /* 말풍선에는 displayText, API에는 promptText 사용 */
  const nm = [...S.msgs, {role:'user', content:promptText, display:displayText}];
  set({msgs:nm, chatInput:'', chatLoading:true, searchIntent:null});
  scrollChat();

  try{
    const sys = `당신은 어센틱금융그룹(AFG)의 AI 상담 어시스턴트입니다.
현재 사용자: ${S.user.name} (${S.user.role==='admin'?'관리자':'플래너'})
${intentGuide}

【내부 지식 베이스 (${rd.length}건)】
${ctx}

【연동된 외부 공식 데이터 소스】
- 보험다모아 (금감원 상품비교): https://www.e-insmarket.or.kr
- 금융감독원 보험공시실: https://www.fss.or.kr
- 생명보험협회 공시실: https://www.klia.or.kr
- 손해보험협회 공시실: https://pub.knia.or.kr
- 금융상품통합비교 finlife: https://finlife.fss.or.kr
- 대법원 판례검색: https://www.law.go.kr
- 건강보험심사평가원: https://www.hira.or.kr
- 삼성생명·한화생명·교보생명·신한라이프 등 주요 보험사 공식 사이트

【답변 형식 규칙 — 반드시 준수】
- 마크다운 기호 절대 사용 금지: ###, ##, **, *, |---|, 테이블(|) 전부 사용하지 마세요
- 제목이나 섹션 구분은 숫자+점 (1. 2. 3.) 또는 ▶ 기호를 사용하세요
- 중요한 내용은 ★ 또는 ※ 기호로 강조하세요
- 항목 나열은 · 또는 - 로 시작하세요
- 표 대신 항목별로 구분해서 나열하세요
- 출처는 [출처: 사이트명] 형식으로 표시하세요

답변 원칙:
1. 내부 지식 베이스를 먼저 확인하고 출처를 명시하세요
2. ${S.aiWeb
    ? '웹 검색 시 위 외부 공식 소스를 우선 참조하고 출처 사이트명을 명시하세요.'
    : '외부 최신 데이터가 필요하면 외부검색을 켜도록 안내하세요.'}
3. 보험료·공시이율·판례 등 수치는 출처와 날짜를 함께 표시하세요
4. 실무에 바로 쓸 수 있도록 간결하고 전문적인 한국어로 답변하세요`;

    const body = {
      model:'claude-sonnet-4-20250514', max_tokens:1500, system:sys,
      /* API 메시지에는 실제 promptText(content) 사용, display 필드는 제외 */
      messages: nm
        .filter(m=>!(m.role==='assistant' && nm.indexOf(m)===0))
        .map(m=>({role:m.role, content:m.content}))
    };
    if(S.aiWeb) body.tools = [{type:"web_search_20250305",name:"web_search"}];

    const res   = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data  = await res.json();
    const reply = (data.content||[]).map(c=>c.type==='text'?c.text:'').filter(Boolean).join('') || '응답을 받지 못했습니다.';
    set({msgs:[...nm,{role:'assistant',content:reply}], chatLoading:false});
  } catch {
    set({msgs:[...nm,{role:'assistant',content:'연결 오류가 발생했습니다. 인터넷 연결을 확인해주세요.'}], chatLoading:false});
  }
  scrollChat();
}
function scrollChat(){setTimeout(()=>{const el=document.getElementById('cmsg');if(el)el.scrollTop=el.scrollHeight;},60)}

render();
</script>
