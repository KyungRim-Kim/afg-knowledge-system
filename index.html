<html lang="ko">
<head>

<style>
/* ── AFG Official Brand Colors (Navy) ─────────────────── */
:root{
  --navy-deep:  #0A1628;   /* 로고 배경 딥네이비 */
  --navy:       #0D1F3C;   /* 메인 배경 */
  --navy-mid:   #112347;   /* 헤더/카드 배경 */
  --navy-light: #172D58;   /* 서피스 */
  --navy-pale:  #1E3A6E;   /* 호버/강조 서피스 */
  --border:     rgba(255,255,255,.08);
  --border-2:   rgba(255,255,255,.13);
  --white:      #FFFFFF;
  --white-2:    rgba(255,255,255,.75);
  --white-3:    rgba(255,255,255,.45);
  --white-4:    rgba(255,255,255,.22);
  --white-5:    rgba(255,255,255,.10);
  --accent:     #4A7FD4;   /* 밝은 블루 액센트 */
  --accent-2:   #2E5FA8;
  --gold:       #C9A96E;   /* 서브 골드 포인트 */
  --gold-dim:   rgba(201,169,110,.15);
  --red-soft:   #C06060;

  --cat-1:#C9A96E; --cat-2:#6BA888; --cat-3:#6896C8;
  --cat-4:#A87878; --cat-5:#68A8A8; --cat-6:#A89068;
  --cat-7:#8878A8; --cat-8:#687888;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--navy)}
::-webkit-scrollbar-thumb{background:var(--navy-pale);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
input,select,textarea,button{font-family:'Noto Sans KR',sans-serif;outline:none;box-sizing:border-box}
textarea{resize:vertical}

.inp{width:100%;background:var(--navy-deep);border:1px solid var(--border-2);border-radius:3px;padding:10px 14px;color:var(--white);font-size:13px;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--white-4)}
select.inp option{background:var(--navy-mid);color:var(--white)}

.lbl{display:block;color:var(--white-3);font-size:11px;margin-bottom:6px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}

.btn-primary{background:var(--accent);color:#fff;border:none;padding:9px 20px;font-size:12px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:background .15s;white-space:nowrap;border-radius:2px}
.btn-primary:hover{background:var(--accent-2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

.btn-line{background:transparent;color:var(--white-3);border:1px solid var(--border-2);padding:9px 18px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border-radius:2px}
.btn-line:hover{border-color:var(--accent);color:var(--white)}

.btn-sm{background:var(--white-5);border:none;color:var(--white-3);padding:4px 10px;font-size:12px;cursor:pointer;transition:all .15s;border-radius:2px}
.btn-sm:hover{color:var(--white);background:var(--border-2)}

.overlay{position:fixed;inset:0;background:rgba(5,12,25,.9);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--navy-mid);border:1px solid var(--border-2);padding:32px;width:100%;max-height:90vh;overflow-y:auto;border-radius:4px}

.toast{position:fixed;top:24px;right:24px;z-index:9999;padding:12px 20px;font-size:13px;font-weight:500;letter-spacing:.02em;animation:fadeSlide .25s ease;border-radius:2px}
@keyframes fadeSlide{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

.tag{background:var(--white-5);color:var(--white-3);font-size:11px;padding:2px 8px;border:1px solid var(--border);letter-spacing:.02em}
.cat-pill{font-size:10px;font-weight:700;padding:2px 8px;letter-spacing:.06em;text-transform:uppercase;border-radius:2px}

.card{background:var(--navy-mid);border:1px solid var(--border);padding:20px;cursor:pointer;transition:all .2s;border-radius:0}
.card:hover{background:var(--navy-light);border-color:var(--border-2)}

.nav-item{background:transparent;color:var(--white-3);border:none;padding:0 16px;height:56px;font-size:12px;font-weight:600;letter-spacing:.08em;cursor:pointer;transition:color .15s;border-bottom:2px solid transparent;text-transform:uppercase;white-space:nowrap}
.nav-item:hover{color:var(--white-2)}
.nav-item.active{color:var(--white);border-bottom-color:var(--accent)}

table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:11px;color:var(--white-4);font-weight:600;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--white-2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--white-5)}

.chat-user{background:var(--accent);color:#fff;padding:12px 16px;font-size:13px;line-height:1.7;max-width:76%;white-space:pre-wrap;font-weight:500;border-radius:2px}
.chat-ai{background:var(--navy-deep);color:var(--white-2);border:1px solid var(--border);padding:12px 16px;font-size:13px;line-height:1.7;max-width:76%;white-space:pre-wrap;border-radius:2px}
#chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.stat-card{background:var(--navy-mid);border:1px solid var(--border);padding:20px 24px}

.hub-section{margin-bottom:36px}
.hub-section-title{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--white-4);text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1px;background:var(--border)}
.hub-card{background:var(--navy-mid);padding:18px 20px;transition:background .15s;text-decoration:none;display:block}
.hub-card:hover{background:var(--navy-light)}
.hub-card-title{font-size:13px;font-weight:600;color:var(--white);margin-bottom:4px}
.hub-card-desc{font-size:11px;color:var(--white-3);line-height:1.5}
.hub-card-badge{font-size:10px;font-weight:700;letter-spacing:.06em;padding:1px 7px;margin-bottom:8px;display:inline-block;text-transform:uppercase;border-radius:2px}

.loading-dots span{animation:blink 1.2s infinite;opacity:0}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:0}50%{opacity:1}}
</style>
</head>

function renderKnowledge(){
  const filtered=S.docs.filter(d=>{
    const catOk=S.selCat==='전체'||d.category===S.selCat;
    const q=S.search.toLowerCase();
    return catOk&&(!q||d.title.toLowerCase().includes(q)||d.content.toLowerCase().includes(q)||(d.tags||[]).some(t=>t.includes(q)));
  });
  const stats=[
    {l:"전체 문서",v:S.docs.length,c:"var(--accent)"},
    {l:"FAQ",v:S.docs.filter(d=>d.category==='FAQ').length,c:"var(--cat-1)"},

  <!-- 통계 카드 -->

    ${stats.map((s,i)=>`<div class="stat-card" style="${i<4?'border-right:none':''}">
      <div style="font-size:26px;font-weight:300;color:${s.c};letter-spacing:-.01em">${s.v}</div>
      <div style="font-size:11px;color:var(--white-4);letter-spacing:.06em;text-transform:uppercase;margin-top:4px">${s.l}</div>
    </div>`).join('')}
  </div>

  <!-- 검색 + 버튼 -->
  <div style="display:flex;gap:12px;margin-bottom:16px;align-items:center">
    <input id="search-input" class="inp" style="flex:1;max-width:360px" placeholder="제목, 내용, 태그 검색" value="${esc(S.search)}">
    <button id="new-doc-btn" class="btn-primary" style="letter-spacing:.05em">+ 새 문서</button>
  </div>

  <!-- 카테고리 필터 -->
  <div style="display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--border)">

  <!-- 문서 그리드 -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border)">
    ${filtered.map(doc=>{
      const ce=S.user.role==='admin'||doc.author===S.user.id;
      const cc=CAT_HEX[doc.category]||'#888';
      return`<div class="card" data-doc-id="${doc.id}">

        <div style="font-size:12px;color:var(--white-3);line-height:1.7;margin-bottom:12px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(doc.content)}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">${(doc.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
        <div style="font-size:11px;color:var(--white-4)">${esc(doc.authorName)} · ${doc.updatedAt}</div>
      </div>`;}).join('')}
  </div>

  `}

function renderStats(){
  const cs=CATEGORIES.map(c=>({cat:c,count:S.docs.filter(d=>d.category===c).length})).filter(s=>s.count>0);
  const us=S.users.map(u=>({name:u.name,team:u.team,count:S.docs.filter(d=>d.author===u.id).length})).sort((a,b)=>b.count-a.count);
  const mx=Math.max(...cs.map(s=>s.count),1);
  return`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)">
    <div style="background:var(--navy-mid);padding:28px">
      <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--white-4);text-transform:uppercase;margin-bottom:20px">카테고리별 문서</div>
      ${cs.map(s=>`<div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:12px;color:var(--white-2)">${s.cat}</span>
          <span style="font-size:12px;color:${CAT_HEX[s.cat]};font-weight:600">${s.count}</span>
        </div>
        <div style="background:var(--border);height:2px"><div style="background:${CAT_HEX[s.cat]};height:2px;width:${(s.count/mx)*100}%;transition:width .4s"></div></div>
      </div>`).join('')}
    </div>
    <div style="background:var(--navy-mid);padding:28px">
      <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--white-4);text-transform:uppercase;margin-bottom:20px">플래너별 기여</div>
      ${us.map((u,i)=>`<div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;color:${i===0?'var(--accent)':'var(--white-4)'};font-weight:700;width:16px;text-align:center">${i+1}</div>
        <div style="flex:1">
          <div style="font-size:13px;color:var(--white);font-weight:500">${esc(u.name)}</div>
          <div style="font-size:11px;color:var(--white-4)">${esc(u.team)}</div>
        </div>
        <div style="font-size:15px;font-weight:600;color:${i===0?'var(--accent)':'var(--white-2)'}">${u.count}</div>
      </div>`).join('')}
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;margin-top:20px;border:1px solid var(--border)">
        ${[["전체 문서",S.docs.length],["플래너",S.users.filter(u=>u.role==='employee').length],["카테고리",CATEGORIES.filter(c=>S.docs.some(d=>d.category===c)).length]]
          .map(([l,v],i)=>`<div style="padding:14px;text-align:center;${i<2?'border-right:1px solid var(--border)':''}">
            <div style="font-size:20px;font-weight:300;color:var(--accent)">${v}</div>
            <div style="font-size:10px;color:var(--white-4);letter-spacing:.06em;text-transform:uppercase;margin-top:3px">${l}</div>
          </div>`).join('')}
      </div>
    </div>
  </div>`}

/* ── 이벤트 바인딩 ────────────────────────────────────── */
function bind(){
  if(!S.user){
    const go=()=>{
      const id=document.getElementById('li')?.value,pw=document.getElementById('lp')?.value;
      const u=S.users.find(u=>u.id===id&&u.pw===pw);
      if(u){const w=`안녕하세요, ${u.name}님.\n\nAFG 지식관리 시스템에 오신 것을 환영합니다.\n내부 지식 베이스와 외부 공시 데이터를 활용하여 상담 업무를 지원합니다.\n\n예시 질문\n· 보험금 청구 서류 안내\n· 암보험 보장 내용 요약\n· 고객이 보험료 부담을 느낄 때 응대 방법\n· 갑상선암 소액암 판례 (웹 검색 ON 권장)`;
        set({user:u,msgs:[{role:'assistant',content:w}]});}
      else{const el=document.getElementById('le');if(el)el.textContent='아이디 또는 비밀번호가 올바르지 않습니다.';}
    };
    document.getElementById('lb')?.addEventListener('click',go);
    document.getElementById('lp')?.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
    document.getElementById('li')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lp').focus();});
    return;
  }
  document.getElementById('logout-btn')?.addEventListener('click',()=>set({user:null,msgs:[]}));
  document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>set({view:b.dataset.view})));

  if(S.view==='knowledge'){
    document.getElementById('search-input')?.addEventListener('input',e=>set({search:e.target.value}));
    document.getElementById('new-doc-btn')?.addEventListener('click',()=>set({showDocForm:true,editDoc:null}));
    document.querySelectorAll('.cat-filter-btn').forEach(b=>b.addEventListener('click',()=>set({selCat:b.dataset.cat})));
    document.querySelectorAll('.card').forEach(card=>{card.addEventListener('click',e=>{
      if(e.target.closest('.edit-doc-btn,.delete-doc-btn'))return;
      const d=S.docs.find(d=>d.id===card.dataset.docId);if(d)set({selDoc:d});
    });});
    document.querySelectorAll('.edit-doc-btn').forEach(b=>b.addEventListener('click',()=>{
      set({editDoc:S.docs.find(d=>d.id===b.dataset.id),showDocForm:true});
    }));
    document.querySelectorAll('.delete-doc-btn').forEach(b=>b.addEventListener('click',()=>{
      if(!confirm('삭제하시겠습니까?'))return;
      const nd=S.docs.filter(d=>d.id!==b.dataset.id);save('afg_d',nd);set({docs:nd});toast('문서가 삭제되었습니다.');
    }));
  }
  document.getElementById('doc-modal-bg')?.addEventListener('click',()=>set({selDoc:null}));
  document.getElementById('close-doc-modal')?.addEventListener('click',()=>set({selDoc:null}));
  document.getElementById('modal-edit')?.addEventListener('click',()=>set({editDoc:S.selDoc,showDocForm:true,selDoc:null}));
  document.getElementById('modal-del')?.addEventListener('click',()=>{
    if(!confirm('삭제하시겠습니까?'))return;
    const nd=S.docs.filter(d=>d.id!==S.selDoc.id);save('afg_d',nd);set({docs:nd,selDoc:null});toast('문서가 삭제되었습니다.');
  });
  document.getElementById('doc-form-bg')?.addEventListener('click',()=>set({showDocForm:false,editDoc:null}));
  document.getElementById('close-doc-form')?.addEventListener('click',()=>set({showDocForm:false,editDoc:null}));
  document.getElementById('cancel-doc-form')?.addEventListener('click',()=>set({showDocForm:false,editDoc:null}));
  document.getElementById('save-doc-form')?.addEventListener('click',()=>{
    const title=document.getElementById('f-title').value.trim();
    const content=document.getElementById('f-content').value.trim();
    const category=document.getElementById('f-cat').value;
    const tags=document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
    if(!title){alert('제목을 입력해주세요.');return;}
    if(!content){alert('내용을 입력해주세요.');return;}
    let nd;
    if(S.editDoc){nd=S.docs.map(d=>d.id===S.editDoc.id?{...d,title,content,category,tags,updatedAt:today()}:d);toast('문서가 수정되었습니다.');}
    else{nd=[{id:'d'+Date.now(),title,content,category,tags,author:S.user.id,authorName:S.user.name,createdAt:today(),updatedAt:today()},...S.docs];toast('문서가 등록되었습니다.');}
    save('afg_d',nd);set({docs:nd,showDocForm:false,editDoc:null});
  });

  if(S.view==='ai'){
    document.querySelectorAll('.ai-cat').forEach(cb=>cb.addEventListener('change',()=>{
      set({aiCats:[...document.querySelectorAll('.ai-cat:checked')].map(c=>c.dataset.cat)});
    }));
    document.getElementById('ai-websearch')?.addEventListener('change',e=>set({aiWebSearch:e.target.checked}));
    document.getElementById('chat-reset')?.addEventListener('click',()=>set({msgs:[{role:'assistant',content:'대화가 초기화되었습니다.'}],chatInput:''}));
    const ci=document.getElementById('chat-input');
    ci?.addEventListener('input',e=>{S.chatInput=e.target.value;});
    ci?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}});
    document.getElementById('chat-send')?.addEventListener('click',sendChat);
    scrollChat();
  }
  if(S.view==='hub'){
    document.querySelectorAll('.hub-tab-btn').forEach(b=>b.addEventListener('click',()=>set({hubTab:b.dataset.tab})));
  }
  if(S.view==='admin'){
    document.querySelectorAll('.admin-tab').forEach(b=>b.addEventListener('click',()=>set({adminTab:b.dataset.tab})));
    document.getElementById('add-user-btn')?.addEventListener('click',()=>set({showUserForm:true,editUser:null}));
    document.querySelectorAll('.edit-user-btn').forEach(b=>b.addEventListener('click',()=>{
      set({editUser:S.users.find(u=>u.id===b.dataset.id),showUserForm:true});
    }));
    document.querySelectorAll('.delete-user-btn').forEach(b=>b.addEventListener('click',()=>{
      if(!confirm(`${b.dataset.name} 직원을 삭제하시겠습니까?`))return;
      const nu=S.users.filter(u=>u.id!==b.dataset.id);save('afg_u',nu);set({users:nu});toast(`${b.dataset.name} 직원이 삭제되었습니다.`);
    }));
    document.querySelectorAll('.admin-del-doc').forEach(b=>b.addEventListener('click',()=>{
      if(!confirm('삭제하시겠습니까?'))return;
      const nd=S.docs.filter(d=>d.id!==b.dataset.id);save('afg_d',nd);set({docs:nd});toast('문서가 삭제되었습니다.');
    }));
  }
  document.getElementById('user-form-bg')?.addEventListener('click',()=>set({showUserForm:false,editUser:null}));
  document.getElementById('close-user-form')?.addEventListener('click',()=>set({showUserForm:false,editUser:null}));
  document.getElementById('cancel-user-form')?.addEventListener('click',()=>set({showUserForm:false,editUser:null}));
  document.getElementById('save-user-form')?.addEventListener('click',()=>{
    const name=document.getElementById('uf-name').value.trim();
    const id=S.editUser?S.editUser.id:document.getElementById('uf-id').value.trim();
    const pw=document.getElementById('uf-pw').value.trim();
    const team=document.getElementById('uf-team').value.trim();
    const role=document.getElementById('uf-role').value;
    if(!name||!id||!pw||!team){alert('모든 항목을 입력해주세요.');return;}
    let nu;
    if(S.editUser){nu=S.users.map(u=>u.id===S.editUser.id?{...u,name,pw,team,role}:u);toast('직원 정보가 수정되었습니다.');}
    else{if(S.users.find(u=>u.id===id)){toast('이미 존재하는 아이디입니다.','err');return;}
      nu=[...S.users,{id,name,pw,team,role,createdAt:today()}];toast(`${name} 직원이 추가되었습니다.`);}
    save('afg_u',nu);set({users:nu,showUserForm:false,editUser:null});
  });
}

/* ── AI 채팅 ──────────────────────────────────────────── */
async function sendChat(){
  if(S.chatLoading)return;
  const el=document.getElementById('chat-input');
  const text=(el?.value||S.chatInput).trim();
  if(!text)return;
  const refDocs=S.aiCats.length>0?S.docs.filter(d=>S.aiCats.includes(d.category)):S.docs;
  const context=refDocs.slice(0,15).map(d=>`[${d.category}] ${d.title}\n${d.content}\n태그: ${(d.tags||[]).join(', ')}`).join('\n\n---\n\n');
  const newMsgs=[...S.msgs,{role:'user',content:text}];
  set({msgs:newMsgs,chatInput:'',chatLoading:true});
  scrollChat();
  try{
    const sys=`당신은 어센틱금융그룹(AFG)의 AI 상담 어시스턴트입니다.
현재 사용자: ${S.user.name} (${S.user.role==='admin'?'관리자':'플래너'})

【내부 지식 베이스】
${context}

답변 원칙:
1. 내부 지식 베이스 내용을 우선 활용하고 출처를 명시하세요 (예: [FAQ], [상품요약])
2. ${S.aiWebSearch?'웹 검색을 통해 최신 보험 정보, 판례, 공시 데이터를 보완하여 답변하세요.':'최신 정보가 필요하면 좌측 패널의 웹 검색을 활성화하도록 안내하세요.'}
3. 실무에 즉시 활용 가능한 명확한 답변을 제공하세요
4. 간결하고 전문적인 한국어로 답변하세요`;
    const body={model:'claude-sonnet-4-20250514',max_tokens:1200,system:sys,
      messages:newMsgs.filter(m=>!(m.role==='assistant'&&newMsgs.indexOf(m)===0)).map(m=>({role:m.role,content:m.content}))};
    if(S.aiWebSearch)body.tools=[{type:"web_search_20250305",name:"web_search"}];
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    const reply=(data.content||[]).map(c=>c.type==='text'?c.text:'').filter(Boolean).join('')||'응답을 받지 못했습니다.';
    set({msgs:[...newMsgs,{role:'assistant',content:reply}],chatLoading:false});
  }catch{
    set({msgs:[...newMsgs,{role:'assistant',content:'연결 오류가 발생했습니다. 인터넷 연결을 확인해주세요.'}],chatLoading:false});
  }
  scrollChat();
}
function scrollChat(){setTimeout(()=>{const el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight;},60)}

render();
</script>
</body>
</html>
